version: '3.8'

services:
  postgres_test:
    image: postgres:15-alpine
    container_name: cstore_postgres_test
    restart: 'no'
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: cstore_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
