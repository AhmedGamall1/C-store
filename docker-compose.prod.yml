services:
  postgres:
    image: postgres:15-alpine
    container_name: cstore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1500m

  redis:
    image: redis:7-alpine
    container_name: cstore_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: cstore_server
    restart: unless-stopped
    init: true # PID 1 reaping; clean SIGTERM forwarding
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '-qO-', '--tries=1', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 700m

  web:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: cstore_web
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      server:
        condition: service_started
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 200m

volumes:
  postgres_data:
  redis_data:
  caddy_data: # Let's Encrypt certs persist here
  caddy_config:
